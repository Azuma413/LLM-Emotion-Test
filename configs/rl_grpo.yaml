experiment_name: llm-emotion-test-rl-grpo
stage: rl_grpo
model:
  base_model: Qwen/Qwen2.5-0.5B-Instruct
  torch_dtype: float16
  use_lora: true
  lora_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
training:
  learning_rate: 0.000001
  batch_size: 1
  max_steps: 2
  generation_max_new_tokens: 96
  report_to: none
rl_task:
  policy_backend: llm
  code_length: 4
  allow_repeats: false
  difficulty: easy
  min_constraints_per_agent: 2
  max_constraints_per_agent: 4
  min_private_candidates: 2
  max_candidate_balance_ratio: 4.0
  max_turns: 3
  num_episodes: 2
  rollouts_per_problem: 4
  sampling_temperature: 1.0
  sampling_top_p: 1.0
  transcript_filename: rl_transcripts.jsonl
output:
  root: outputs/runs
  run_id: rl-grpo-smoke
