experiment_name: llm-emotion-test-rl-grpo
stage: rl_grpo
model:
  base_model: Qwen/Qwen3.5-2B
  torch_dtype: bfloat16
  device_map: auto
  use_lora: true
  lora_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
latent_training:
  mode: regression
  loss_weight: 1.0
  target: soft_prompt_mean
  detach_target: true
  normalize: true
  anchor_token: "<|latent_pred|>"
  auxiliary_classification_weight: 0.0
training:
  learning_rate: 0.000001
  batch_size: 1
  max_steps:
  max_seq_length: 1024
  generation_max_new_tokens: 64
  report_to: wandb
data:
  sft_task: continuation
  min_prefix_chars: 1
  min_target_chars: 1
  target_latent_strategy: copy_input
rl_task:
  policy_backend: llm
  resume_from_checkpoint: outputs/runs/distill/checkpoints/final
  code_length: 4
  allow_repeats: false
  difficulty: easy
  min_constraints_per_agent: 2
  max_constraints_per_agent: 4
  min_private_candidates: 2
  max_candidate_balance_ratio: 4.0
  max_turns: 3
  num_episodes: 100
  rollouts_per_problem: 4
  eval_episodes: 16
  sampling_temperature: 1.0
  sampling_top_p: 1.0
  transcript_filename: rl_transcripts.jsonl
  third_party_backend: rule_based
output:
  root: outputs/runs
  run_id: rl-grpo
runtime:
  require_gpu: true
