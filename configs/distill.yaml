experiment_name: llm-emotion-test-distill
stage: distill
model:
  base_model: Qwen/Qwen2.5-0.5B-Instruct
data:
  processed_dir: datasets/distill
  processed_filename: student-sft.jsonl
  max_samples: 100
training:
  learning_rate: 0.00002
  batch_size: 1
  max_steps: 10
  report_to: none
distillation:
  teacher_model: Qwen/Qwen3.5-9B
  teacher_batch_size: 1
  temperature: 0.7
  top_p: 0.9
  max_new_tokens: 128
  source_data_path: datasets/processed/sft-smoke.jsonl
  overwrite_cache: false
  require_teacher_latent_marker: false
  max_teacher_output_chars: 1000
  deduplicate: true
  kl_divergence_weight: 0.0
output:
  root: outputs/runs
  run_id: distill-smoke
