experiment_name: llm-emotion-test-distill
stage: distill
model:
  base_model: Qwen/Qwen2.5-0.5B-Instruct
  torch_dtype: bfloat16
  device_map: auto
  use_lora: true
  lora_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
data:
  processed_dir: datasets/distill
  processed_filename: student-sft-gpu.jsonl
  max_samples: 8
training:
  learning_rate: 0.00002
  batch_size: 1
  max_steps: 2
  max_seq_length: 512
  precision: bf16
  logging_steps: 1
  eval_steps: 1
  save_steps:
  eval_max_samples: 8
  sample_count: 1
  generation_max_new_tokens: 32
  report_to: none
distillation:
  teacher_model: Qwen/Qwen2.5-0.5B-Instruct
  teacher_torch_dtype: bfloat16
  teacher_device_map: auto
  teacher_batch_size: 1
  temperature: 0.7
  top_p: 0.9
  max_new_tokens: 32
  source_data_path: datasets/processed/sft-gpu.jsonl
  student_checkpoint_dir: outputs/runs/sft-gpu/checkpoints/final
  overwrite_cache: false
  require_teacher_latent_marker: false
  max_teacher_output_chars: 1000
  deduplicate: true
  kl_divergence_weight: 0.0
output:
  root: outputs/runs
  run_id: distill-gpu
runtime:
  require_gpu: true
