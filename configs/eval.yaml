experiment_name: llm-emotion-test-eval
stage: eval
model:
  base_model: Qwen/Qwen3.5-2B
  torch_dtype: bfloat16
  device_map: auto
data:
  processed_dir: datasets/processed
  sft_task: continuation
  min_prefix_chars: 1
  min_target_chars: 1
  target_latent_strategy: copy_input
  max_samples:
training:
  max_steps:
  generation_max_new_tokens: 64
  report_to: none
rl_task:
  policy_backend: llm
  code_length: 4
  allow_repeats: false
  difficulty: easy
  min_constraints_per_agent: 2
  max_constraints_per_agent: 4
  min_private_candidates: 2
  max_candidate_balance_ratio: 4.0
  max_generation_attempts: 500
  max_turns: 3
  eval_episodes: 16
  checkpoint_filename: rl_checkpoint.json
evaluation:
  num_tasks: 100
  task_seed_offset: 50000
  source_run_dir: outputs/runs/rl-grpo
  model_variant_backend: llm
  sft_model_checkpoint_dir: outputs/runs/sft/checkpoints/final
  distilled_model_checkpoint_dir: outputs/runs/distill/checkpoints/final
  rl_model_checkpoint_dir: outputs/runs/rl-grpo/checkpoints/final
  transcript_sample_count: 10
  failure_sample_count: 10
output:
  root: outputs/runs
  run_id: eval
runtime:
  require_gpu: true
