experiment_name: llm-emotion-test-eval
stage: eval
model:
  base_model: Qwen/Qwen2.5-0.5B-Instruct
  torch_dtype: bfloat16
  device_map: auto
data:
  processed_dir: datasets/processed
  max_samples: 32
training:
  report_to: none
rl_task:
  policy_backend: tabular_smoke
  code_length: 4
  allow_repeats: false
  difficulty: easy
  min_constraints_per_agent: 2
  max_constraints_per_agent: 4
  min_private_candidates: 2
  max_candidate_balance_ratio: 4.0
  max_generation_attempts: 500
  max_turns: 3
  eval_episodes: 4
  checkpoint_filename: rl_checkpoint.json
evaluation:
  num_tasks: 4
  task_seed_offset: 50000
  source_run_dir: outputs/runs/rl-grpo-gpu
  model_variant_backend: auto
  sft_model_checkpoint_dir: outputs/runs/sft-gpu/checkpoints/final
  distilled_model_checkpoint_dir: outputs/runs/distill-gpu/checkpoints/final
  rl_model_checkpoint_dir: outputs/runs/rl-grpo-gpu/checkpoints/final
  transcript_sample_count: 3
  failure_sample_count: 3
output:
  root: outputs/runs
  run_id: eval-gpu
