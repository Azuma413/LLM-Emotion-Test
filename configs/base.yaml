experiment_name: llm-emotion-test
stage: base
model:
  base_model: Qwen/Qwen3.5-2B
  tokenizer: null
  trust_remote_code: true
soft_prompt:
  num_latents: 8
  prompt_length: 4
  init_strategy: normal
  latent_marker_template: "<|emotion|>{latent_id:03d}<|/emotion|>"
data:
  dataset_name: shunk031/wrime
  dataset_config: ver1
  raw_dir: datasets/raw
  processed_dir: datasets/processed
  processed_filename: sft.jsonl
  summary_filename: data_summary.json
  text_column: sentence
  annotation_source: writer
  emotion_labels:
    - joy
    - sadness
    - anticipation
    - surprise
    - anger
    - fear
    - disgust
    - trust
  representative_label_map: {}
  copy_input_latent_probability: 0.5
  max_samples: 100
  seed: 42
training:
  learning_rate: 0.00002
  batch_size: 1
  gradient_accumulation_steps: 1
  max_steps: 10
  max_seq_length: 512
  precision: bf16
  logging_steps: 1
  eval_steps: null
  save_steps: null
  warmup_steps: 0
  weight_decay: 0.0
  num_train_epochs: 1.0
  eval_max_samples: 16
  sample_count: 4
  generation_max_new_tokens: 64
  report_to: wandb
output:
  root: outputs/runs
  run_id: smoke
runtime:
  device: auto
  seed: 42
