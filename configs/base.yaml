experiment_name: llm-emotion-test
stage: base
model:
  base_model: Qwen/Qwen2.5-0.5B-Instruct
  tokenizer: null
  trust_remote_code: true
soft_prompt:
  num_latents: 8
  prompt_length: 4
  init_strategy: normal
  latent_marker_template: "<|emotion|>{latent_id:03d}<|/emotion|>"
data:
  dataset_name: shunk031/wrime
  dataset_config: ver1
  raw_dir: datasets/raw
  processed_dir: datasets/processed
  processed_filename: sft.jsonl
  text_column: sentence
  annotation_source: writer
  emotion_labels:
    - joy
    - sadness
    - anticipation
    - surprise
    - anger
    - fear
    - disgust
    - trust
  representative_label_map: {}
  copy_input_latent_probability: 0.5
  max_samples: 100
  seed: 42
training:
  learning_rate: 0.00002
  batch_size: 1
  gradient_accumulation_steps: 1
  max_steps: 10
  precision: bf16
  report_to: wandb
output:
  root: outputs/runs
  run_id: smoke
runtime:
  device: auto
  seed: 42
