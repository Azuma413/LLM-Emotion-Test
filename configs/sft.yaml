experiment_name: llm-emotion-test-sft
stage: sft
model:
  base_model: Qwen/Qwen3.5-2B
soft_prompt:
  num_latents: 8
  prompt_length: 4
data:
  dataset_name: shunk031/wrime
  dataset_config: ver1
  processed_filename: sft-smoke.jsonl
  text_column: sentence
  annotation_source: writer
  max_samples: 100
training:
  learning_rate: 0.00002
  batch_size: 1
  gradient_accumulation_steps: 1
  max_steps: 10
  max_seq_length: 512
  precision: bf16
  logging_steps: 1
  eval_steps: 5
  save_steps: 10
  eval_max_samples: 16
  sample_count: 4
  generation_max_new_tokens: 64
  report_to: none
output:
  root: outputs/runs
  run_id: sft-smoke
