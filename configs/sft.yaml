experiment_name: llm-emotion-test-sft
stage: sft
model:
  base_model: Qwen/Qwen3.5-2B
  torch_dtype: bfloat16
  device_map: auto
  use_lora: true
  lora_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
soft_prompt:
  num_latents: 8 # emotion IDの個数
  prompt_length: 4 # emotion IDごとのトークン数
  init_strategy: normal
  latent_marker_template: "<|emotion|>{latent_id:03d}<|/emotion|>"
latent_training:
  mode: regression
  loss_weight: 1.0
  target: soft_prompt_mean
  detach_target: true
  normalize: true
  anchor_token: "<|latent_pred|>"
  auxiliary_classification_weight: 0.0
data:
  dataset_name: shunk031/wrime
  dataset_config: ver1
  raw_dir: datasets/raw
  processed_dir: datasets/processed
  processed_filename: sft.jsonl
  summary_filename: data_summary.json
  text_column: sentence
  annotation_source: writer
  emotion_labels:
    - joy
    - sadness
    - anticipation
    - surprise
    - anger
    - fear
    - disgust
    - trust
  representative_label_map: {}
  sft_task: continuation
  min_prefix_chars: 1
  min_target_chars: 1
  target_latent_strategy: copy_input
  max_samples:
  seed: 42
training:
  learning_rate: 0.00002
  batch_size: 32
  gradient_accumulation_steps: 2
  max_steps:
  max_seq_length: 1024
  precision: bf16
  logging_steps: 10
  eval_steps: 500
  save_steps: 500
  warmup_steps: 100
  weight_decay: 0.01
  num_train_epochs: 4.0
  eval_max_samples: 16
  sample_count: 8
  generation_max_new_tokens: 128
  report_to: wandb
output:
  root: outputs/runs
  run_id: sft
runtime:
  require_gpu: true
